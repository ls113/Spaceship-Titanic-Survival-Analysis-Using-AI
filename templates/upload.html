{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-4 text-white">📡 Data Ingestion Portal</h1>
        <p class="text-info lead">Upload passenger manifests for bulk survival analysis.</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-10">
            
            <div id="drop-zone" class="card bg-dark border-info text-white p-5 text-center shadow-lg mb-4" 
                 style="border: 2px dashed #0dcaf0; transition: 0.3s; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); cursor: pointer;">
                <input type="file" id="csvFile" hidden accept=".csv">
                
                <div class="py-4" id="upload-content">
                    <i class="bi bi-cloud-arrow-up-fill text-info" style="font-size: 5rem;"></i>
                    <h3 class="mt-3">Ready for Uplink</h3>
                    <p class="text-muted">Drag & Drop manifest (.csv) or click to browse</p>
                    <div class="mt-2">
                        <span class="badge rounded-pill bg-outline-info border border-info px-3 py-2">MAX SIZE: 10MB</span>
                    </div>
                </div>

                <div id="uploading-state" class="d-none py-4">
                    <div class="spinner-border text-info" role="status" style="width: 3rem; height: 3rem;"></div>
                    <h4 class="mt-3 text-info">Analyzing Quantum Data...</h4>
                    <div class="progress mt-4 mx-auto" style="width: 60%; height: 6px;">
                        <div class="progress-bar progress-bar-striped progress-bar-animated bg-info" style="width: 100%"></div>
                    </div>
                </div>
            </div>

            <div id="analysis-results" class="card bg-dark border-success shadow-lg d-none mt-4" style="background: rgba(0,20,0,0.2); backdrop-filter: blur(15px);">
                <div class="card-header bg-transparent border-success d-flex justify-content-between align-items-center py-3">
                    <span class="fw-bold text-success">
                        <i class="bi bi-shield-check me-2"></i> QUANTUM ANALYSIS COMPLETE
                    </span>
                    <div class="btn-group">
                        <a href="/download_results" class="btn btn-sm btn-success px-4 shadow-sm">
                            <i class="bi bi-download me-2"></i> DOWNLOAD FULL CSV
                        </a>
                        <button onclick="location.reload()" class="btn btn-sm btn-outline-info ms-2">
                            <i class="bi bi-arrow-repeat"></i> NEW UPLOAD
                        </button>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive" style="max-height: 450px;">
                        <table class="table table-dark table-hover mb-0">
                            <thead class="sticky-top bg-dark text-info border-bottom border-secondary">
                                <tr id="resHead"></tr>
                            </thead>
                            <tbody id="resBody" class="text-white-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('csvFile');
    const uploadContent = document.getElementById('upload-content');
    const uploadingState = document.getElementById('uploading-state');
    const resultSection = document.getElementById('analysis-results');

    // --- Interaction Logic ---
    dropZone.onclick = () => fileInput.click();

    dropZone.ondragover = (e) => { 
        e.preventDefault(); 
        dropZone.style.borderColor = "#fff"; 
        dropZone.style.background = "rgba(0,255,255,0.1)"; 
    };
    
    dropZone.ondragleave = () => { 
        dropZone.style.borderColor = "#0dcaf0"; 
        dropZone.style.background = "rgba(0,0,0,0.4)"; 
    };

    dropZone.ondrop = (e) => { 
        e.preventDefault(); 
        handleFile(e.dataTransfer.files[0]); 
    };

    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    // --- Core Processing Logic ---
    function handleFile(file) {
        if (!file || !file.name.endsWith('.csv')) {
            alert("Protocol Error: Only .csv manifests are accepted.");
            return;
        }

        // Show Loading UI
        uploadContent.classList.add('d-none');
        uploadingState.classList.remove('d-none');
        dropZone.style.borderColor = "#0dcaf0";

        const formData = new FormData();
        formData.append('file', file);

        // Fetch to Backend
        fetch('/upload_csv', { method: 'POST', body: formData })
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") {
                renderResults(data);
            } else {
                alert("Processing Error: " + data.error);
                location.reload();
            }
        })
        .catch(err => {
            console.error(err);
            alert("Uplink Lost: Server connection failed.");
            location.reload();
        });
    }

    function renderResults(data) {
        // 1. Hide the upload zone entirely
        dropZone.classList.add('d-none');
        
        // 2. Clear previous table data
        const head = document.getElementById('resHead');
        const body = document.getElementById('resBody');
        head.innerHTML = "";
        body.innerHTML = "";

        // 3. Render Header Columns
        data.columns.forEach(colName => {
            const th = document.createElement('th');
            th.className = "px-3 py-3 border-secondary text-uppercase small";
            th.innerText = colName;
            head.appendChild(th);
        });

        // 4. Render Data Rows (Preview first 15 rows)
        data.data.forEach(rowData => {
            const tr = document.createElement('tr');
            tr.className = "border-secondary";
            
            rowData.forEach(cellData => {
                const td = document.createElement('td');
                td.className = "px-3 py-2 border-secondary align-middle";
                
                // Colorize the prediction status if the cell contains "TRANSPORTED" or "SAFE"
                const content = cellData.toString();
                if (content.includes("TRANSPORTED")) {
                    td.innerHTML = `<span class="badge bg-primary-subtle text-primary border border-primary-subtle px-2"><i class="bi bi-rocket-takeoff me-1"></i> ${content}</span>`;
                } else if (content.includes("SAFE")) {
                    td.innerHTML = `<span class="badge bg-success-subtle text-success border border-success-subtle px-2"><i class="bi bi-shield-check me-1"></i> ${content}</span>`;
                } else {
                    td.innerText = cellData;
                }
                tr.appendChild(td);
            });
            body.appendChild(tr);
        });
        
        // 5. Reveal the results section with a smooth scroll
        resultSection.classList.remove('d-none');
        resultSection.scrollIntoView({ behavior: 'smooth' });
    }
</script>

<style>
    .bg-dark { background-color: #0b0c10 !important; }
    .text-info { color: #66fcf1 !important; }
    
    /* Table Styling */
    .table-dark { background-color: transparent !important; }
    .table-hover tbody tr:hover { background: rgba(102, 252, 241, 0.05) !important; }
    .sticky-top { top: -1px; z-index: 1020; }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0b0c10; }
    ::-webkit-scrollbar-thumb { background: #45a29e; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #66fcf1; }
</style>

{% endblock %}
