{% extends "base.html" %}
{% block content %}

<h1>📊 Analytics Dashboard</h1>

<div class="grid">
    <div class="card glow">
        <h3>Survival Rate</h3>
        <h2>78%</h2>
    </div>

    <div class="card glow">
        <h3>Avg Spending</h3>
        <h2>$450</h2>
    </div>

    <div class="card glow">
        <h3>VIP Survival</h3>
        <h2>85%</h2>
    </div>
</div>

<canvas id="lineChart"></canvas>
<canvas id="barChart"></canvas>

<script>
new Chart(document.getElementById("lineChart"), {
    type: 'line',
    data: {
        labels: ["Jan","Feb","Mar","Apr","May"],
        datasets: [{
            label: "Survival Trend",
            data: [50,60,70,65,78],
            fill: true
        }]
    }
});

new Chart(document.getElementById("barChart"), {
    type: 'bar',
    data: {
        labels: ["Age","Spending","VIP","CryoSleep"],
        datasets: [{
            label: "Impact Score",
            data: [70,80,60,90]
        }]
    }
});
</script>

{% endblock %}
